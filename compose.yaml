services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: control
      POSTGRES_USER: control
      POSTGRES_PASSWORD: control
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U control"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports: ["5432:5432"]
    volumes:
      - control-data:/var/lib/postgresql/data
      - ./infra/sql/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

  jaeger:
    image: jaegertracing/all-in-one:1.68.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"

  tool-server:
    build:
      context: .
      target: runtime
    command: ["synthetic-tool-server"]
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql://control:control@postgres:5432/control
      REPOSITORY_BACKEND: postgres
      PORT: "8081"
    depends_on:
      postgres: {condition: service_healthy}
    ports: ["8081:8081"]

  control-api:
    build:
      context: .
      target: runtime
    command: ["control-api"]
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql://control:control@postgres:5432/control
      REPOSITORY_BACKEND: postgres
      MCP_SERVER_URL: http://tool-server:8081/mcp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      PORT: "8080"
    depends_on:
      postgres: {condition: service_healthy}
      tool-server: {condition: service_started}
      jaeger: {condition: service_started}
    ports: ["8080:8080"]

volumes:
  control-data:

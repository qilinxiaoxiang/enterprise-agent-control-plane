name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: control
          POSTGRES_USER: control
          POSTGRES_PASSWORD: control
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U control"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.15.8'
      - run: uv sync --extra dev --frozen
      - run: uv run ruff check src tests
      - run: uv run mypy src
      - run: uv run pytest -m 'not integration'
      - run: npm ci && npm run lint && npm run build
        working-directory: frontend
      - name: Initialize integration database
        run: uv run python -c "from control_plane.migrations import run_migrations; run_migrations('postgresql://control:control@localhost:5432/control')"
      - name: Start MCP tool server
        run: |
          DATABASE_URL=postgresql://control:control@localhost:5432/control \
            PORT=8081 uv run synthetic-tool-server > /tmp/mcp.log 2>&1 &
          echo "MCP_PID=$!" >> "$GITHUB_ENV"
      - name: Run PostgreSQL and MCP integration
        env:
          INTEGRATION_DATABASE_URL: postgresql://control:control@localhost:5432/control
          INTEGRATION_MCP_URL: http://localhost:8081/mcp
        run: uv run pytest -m integration
      - run: uv run control-eval --suite evals/cases.jsonl --output evals/results/ci.json
      - run: terraform init -backend=false && terraform validate
        working-directory: infra/terraform
      - run: docker build -t agent-control-plane:ci .
      - uses: actions/upload-artifact@v4
        with:
          name: deterministic-evaluation
          path: evals/results/ci.json
      - name: Stop MCP tool server
        if: always()
        run: |
          kill "${MCP_PID}" 2>/dev/null || true
          wait "${MCP_PID}" 2>/dev/null || true

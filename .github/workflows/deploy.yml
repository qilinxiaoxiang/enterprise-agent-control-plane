name: deploy-gcp

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: demo
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: us-central1
      REPOSITORY: agent-control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
      - run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
      - name: Build and push immutable image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/app:${GITHUB_SHA}"
          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"
          DIGEST=$(gcloud artifacts docker images describe "${IMAGE}" --format='value(image_summary.digest)')
          echo "IMAGE=${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/app@${DIGEST}" >> "$GITHUB_ENV"
      - name: Roll immutable image to provisioned services
        run: |
          gcloud run services update agent-control-tools \
            --project "${PROJECT_ID}" --region "${REGION}" --image "${IMAGE}" --quiet
          gcloud run services update agent-control-api \
            --project "${PROJECT_ID}" --region "${REGION}" --image "${IMAGE}" --quiet
      - name: Public smoke
        run: |
          CONTROL_URL=$(gcloud run services describe agent-control-api \
            --project "${PROJECT_ID}" --region "${REGION}" --format='value(status.url)')
          curl --fail --retry 10 --retry-all-errors "${CONTROL_URL}/v1/health"
